<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Library</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 15px; }
        #searchInput { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #333; background: #1e1e1e; color: white; font-size: 16px; box-sizing: border-box; outline: none; }
        .menu-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .btn-cat { background: #2c2c2c; color: #bbb; border: 1px solid #3d3d3d; padding: 10px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; text-transform: uppercase; transition: 0.2s; }
        .btn-cat.active { background: #007bff; color: white; border-color: #007bff; font-weight: bold; }
        .btn-favorites { background: #ff4757 !important; color: white !important; border: none; }
        #clearFavsBtn { background: #444; color: #fff; border: none; display: none; }
        #midCategories, #subCategories { display: none; padding-top: 10px; margin-top: 5px; flex-wrap: wrap; gap: 8px; }
        #midCategories { border-top: 1px solid #333; }
        #subCategories { border-top: 1px dotted #444; }
        .models-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; margin-top: 20px; }
        .model-card { background: #1e1e1e; border-radius: 10px; overflow: hidden; padding: 12px; text-align: center; border: 1px solid #2c2c2c; display: flex; flex-direction: column; position: relative; }
        .fav-btn { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.1); border: none; color: rgba(255,255,255,0.4); border-radius: 50%; width: 26px; height: 26px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; z-index: 10; backdrop-filter: blur(2px); }
        .fav-btn.active { color: white; background: #ff4757; }
        .img-wrapper { width: 100%; height: 130px; background: #000; border-radius: 6px; overflow: hidden; margin-bottom: 10px; cursor: zoom-in; }
        .model-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .model-name { font-size: 14px; height: 36px; overflow: hidden; margin-bottom: 12px; color: #fff; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .btn-download { background: #28a745; color: white; text-decoration: none; padding: 10px; border-radius: 6px; font-size: 13px; font-weight: bold; margin-top: auto; }
        .modal { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; cursor: zoom-out; }
        .modal img { max-width: 95%; max-height: 95%; border-radius: 8px; }
    </style>
</head>
<body>
    <div id="loader" style="text-align:center; padding:50px;">
        <div id="loaderText" style="color:white; font-size:18px;">⌛ Завантаження...</div>
    </div>

    <div id="paywall" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#121212; z-index:9999; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px;">
        <h2 style="color:#ff4757;">⌛ Термін підписки вичерпано</h2>
        <p>Для відновлення доступу до бази моделей IMAGINATE,<br>будь ласка, оновіть підписку.</p>
        <a href="https://wayforpay.com/..." style="display:inline-block; background:#28a745; color:white; padding:15px 30px; border-radius:10px; text-decoration:none; font-weight:bold; margin-top:20px;">Оплатити доступ — 150 грн</a>
    </div>

    <div id="mainApp" style="display:none;">
        <div id="imageModal" class="modal" onclick="this.style.display='none'"><img id="modalImg" src=""></div>
        <input type="text" id="searchInput" placeholder="Пошук моделі...">
        <div id="mainMenu" class="menu-container">
            <button class="btn-cat active" onclick="resetAll(this)">Всі моделі</button>
            <button class="btn-cat btn-favorites" id="favCounterBtn" onclick="showFavorites(this)">❤️ ОБРАНЕ (0)</button>
            <button class="btn-cat" id="clearFavsBtn" onclick="clearAllFavorites()">🗑️ ОЧИСТИТИ</button>
        </div>
        <div id="midCategories" class="menu-container"></div>
        <div id="subCategories" class="menu-container"></div>
        <div id="modelsGrid" class="models-grid"></div>
    </div>

    <script>
        const SHEET_ID = '1bcX0zQphJsAmFTySQ_iWYpNXgFnNZ5XGBHpGGvHI9K8';
        const JSON_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
        const AUTH_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxeJAo0aJXF_nHM0va-tf0x2x4fgThMqfRkEDL2ki58nl4dQUjTc7NKTT7PixqHK4YG/exec';

        const tg = window.Telegram.WebApp;
        tg.expand();

        let allModels = [];
        let favorites = JSON.parse(localStorage.getItem('my3dFavs')) || [];
        let curL1 = 'all', curL2 = 'all';
        let displayLimit = 60;

        window.authHandler = function(data) {
            console.log("Відповідь:", data);
            if (data && (data.access === true || data.daysLeft > 0)) {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                loadModels();
            } else {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('paywall').style.display = 'flex';
            }
        };

        function checkAccess() {
            // Беремо дані користувача або ставимо "0", якщо Телеграм тупить
            const user = tg.initDataUnsafe?.user || {};
            const userId = String(user.id || "0");
            const userName = encodeURIComponent(user.username || "Guest");

            const script = document.createElement('script');
            // Додаємо Timestamp для скидання кешу
            script.src = `${AUTH_SCRIPT_URL}?userId=${userId}&userName=${userName}&callback=authHandler&t=${Date.now()}`;
            document.body.appendChild(script);

            // Таймер на випадок, якщо Google Script взагалі не відповідає
            setTimeout(() => {
                if (document.getElementById('mainApp').style.display === 'none' && 
                    document.getElementById('paywall').style.display === 'none') {
                    document.getElementById('loaderText').innerHTML = "⚠️ Помилка зв'язку. Спробуйте оновити сторінку (Reload).";
                }
            }, 6000);
        }

        async function loadModels() {
            try {
                const res = await fetch(JSON_URL);
                const text = await res.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                allModels = json.table.rows
                    .filter(row => row.c && row.c[0] && row.c[0].v)
                    .map(row => {
                        let n = String(row.c[0].v).replace(/\[.*?\]/g, "").trim();
                        let rawP = row.c[1] ? String(row.c[1].v) : "";
                        let fId = "";
                        if (rawP.includes('id=')) fId = rawP.split('id=')[1].split('&')[0];
                        else if (rawP.includes('/d/')) fId = rawP.split('/d/')[1].split('/')[0];
                        return { 
                            id: fId || n, 
                            name: n, 
                            preview: fId ? `https://lh3.googleusercontent.com/u/0/d/${fId}` : rawP, // Твоє превью
                            archive: row.c[2] ? String(row.c[2].v) : "#", 
                            tags: row.c[3] ? String(row.c[3].v).toLowerCase() : "" 
                        };
                    });
                initMenu();
                renderModels(allModels);
                updateFavCounter();
            } catch (err) { console.error(err); }
        }

        // Тут ідуть всі інші твої функції (formatName, initMenu, selectLvl1, selectLvl2, filterModels, renderModels, resetAll, toggleFavorite, updateFavCounter, showFavorites, clearAllFavorites, openModal)
        // Встав їх сюди зі свого робочого коду.
        
        function formatName(str) { return str.replace(/#/g, '').replace(/_MENU/g, '').replace(/_/g, ' '); }
        function initMenu() { const menu = document.getElementById('mainMenu'); const btns = menu.querySelectorAll('.btn-cat'); btns.forEach(btn => { if (btn.innerText !== "Всі моделі" && !btn.id.includes('fav')) btn.remove(); }); Object.keys(categoryData).forEach(cat => { const btn = document.createElement('button'); btn.className = 'btn-cat'; btn.innerText = formatName(cat); btn.onclick = () => selectLvl1(cat, btn); menu.appendChild(btn); }); }
        function selectLvl1(cat, btn) { document.querySelectorAll('#mainMenu .btn-cat').forEach(b => b.classList.remove('active')); btn.classList.add('active'); curL1 = cat.toLowerCase().replace('_menu', '').replace('#', ''); curL2 = 'all'; document.getElementById('midCategories').innerHTML = ''; document.getElementById('midCategories').style.display = 'flex'; document.getElementById('subCategories').style.display = 'none'; Object.keys(categoryData[cat]).forEach(mid => { const mBtn = document.createElement('button'); mBtn.className = 'btn-cat'; mBtn.innerText = formatName(mid); mBtn.onclick = () => selectLvl2(cat, mid, mBtn); document.getElementById('midCategories').appendChild(mBtn); }); filterModels(); }
        function selectLvl2(lvl1, mid, btn) { document.querySelectorAll('#midCategories .btn-cat').forEach(b => b.classList.remove('active')); btn.classList.add('active'); curL2 = mid.toLowerCase().replace('_menu', '').replace('#', ''); document.getElementById('subCategories').innerHTML = ''; document.getElementById('subCategories').style.display = 'flex'; categoryData[lvl1][mid].forEach(sub => { const sBtn = document.createElement('button'); sBtn.className = 'btn-cat'; sBtn.innerText = formatName(sub); sBtn.onclick = () => { document.querySelectorAll('#subCategories .btn-cat').forEach(b => b.classList.remove('active')); sBtn.classList.add('active'); filterModels(sub.toLowerCase().replace('#', '')); }; document.getElementById('subCategories').appendChild(sBtn); }); filterModels(); }
        function filterModels(subTag = 'all') { displayLimit = 60; const query = document.getElementById('searchInput').value.toLowerCase(); const filtered = allModels.filter(m => { const t = m.tags; const matchSearch = m.name.toLowerCase().includes(query) || t.includes(query); if (curL1 === 'all' && query === '') return true; const matchL1 = curL1 === 'all' || t.includes(curL1); const matchL2 = curL2 === 'all' || t.includes(curL2); const matchL3 = subTag === 'all' || t.includes(subTag); return matchSearch && matchL1 && matchL2 && matchL3; }); renderModels(filtered); }
        function renderModels(models) { const grid = document.getElementById('modelsGrid'); grid.innerHTML = ''; const visible = models.slice(0, displayLimit); visible.forEach(m => { const isFav = favorites.includes(m.id); const card = document.createElement('div'); card.className = 'model-card'; card.innerHTML = ` <button class="fav-btn ${isFav ? 'active' : ''}" onclick="event.stopPropagation(); toggleFavorite('${m.id}', this)">❤️</button> <div class="img-wrapper" onclick="openModal('${m.preview}')"> <img src="${m.preview}" loading="lazy" onerror="this.src='https://via.placeholder.com/160x130/2c2c2c/888888?text=Error'"> </div> <div class="model-name">${m.name}</div> <a href="${m.archive}" class="btn-download" target="_blank">Download</a> `; grid.appendChild(card); }); if (models.length > displayLimit) { const moreBtn = document.createElement('button'); moreBtn.className = 'btn-cat'; moreBtn.style.cssText = "width: 100%; margin: 20px 0; padding: 15px; background: #333; color: white; border: none; border-radius: 8px;"; moreBtn.innerText = "ПОКАЗАТИ ЩЕ"; moreBtn.onclick = () => { displayLimit += 100; renderModels(models); }; grid.appendChild(moreBtn); } }
        function resetAll(btn) { document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active')); btn.classList.add('active'); curL1 = 'all'; curL2 = 'all'; document.getElementById('midCategories').style.display = 'none'; document.getElementById('subCategories').style.display = 'none'; renderModels(allModels); }
        function toggleFavorite(id, btn) { const idx = favorites.indexOf(id); if (idx > -1) favorites.splice(idx, 1); else favorites.push(id); localStorage.setItem('my3dFavs', JSON.stringify(favorites)); btn.classList.toggle('active'); updateFavCounter(); }
        function updateFavCounter() { document.getElementById('favCounterBtn').innerText = `❤️ ОБРАНЕ (${favorites.length})`; document.getElementById('clearFavsBtn').style.display = favorites.length > 0 ? 'inline-block' : 'none'; }
        function showFavorites(btn) { document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active')); btn.classList.add('active'); document.getElementById('midCategories').style.display = 'none'; document.getElementById('subCategories').style.display = 'none'; renderModels(allModels.filter(m => favorites.includes(m.id))); }
        function clearAllFavorites() { if (confirm("Очистити обране?")) { favorites = []; localStorage.setItem('my3dFavs', JSON.stringify(favorites)); updateFavCounter(); renderModels(allModels); } }
        function openModal(src) { document.getElementById('modalImg').src = src; document.getElementById('imageModal').style.display = 'flex'; }

        // ЗАПУСК
        checkAccess();

        // categoryData (Твої категорії - просто додай решту об'єкта, якщо він тут скорочений)
        const categoryDataFull = { 
           // ... (тут має бути твій повний список категорій)
        };
    </script>
</body>
</html>
