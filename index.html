<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Library</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 15px; }
        #searchInput { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #333; background: #1e1e1e; color: white; font-size: 16px; box-sizing: border-box; outline: none; }
        .menu-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .btn-cat { background: #2c2c2c; color: #bbb; border: 1px solid #3d3d3d; padding: 10px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; text-transform: uppercase; transition: 0.2s; }
        .btn-cat.active { background: #007bff; color: white; border-color: #007bff; font-weight: bold; }
        .btn-favorites { background: #ff4757 !important; color: white !important; border: none; }
        #clearFavsBtn { background: #444; color: #fff; border: none; display: none; }
        
        #midCategories { padding-top: 10px; border-top: 1px solid #333; display: none; margin-top: 5px; }
        #subCategories { padding-top: 10px; border-top: 1px dotted #444; display: none; margin-top: 5px; }

        .models-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
        .model-card { background: #1e1e1e; border-radius: 10px; overflow: hidden; padding: 12px; text-align: center; border: 1px solid #2c2c2c; display: flex; flex-direction: column; position: relative; }
        
        .fav-btn { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.1); border: none; color: rgba(255,255,255,0.4); border-radius: 50%; width: 26px; height: 26px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; z-index: 10; transition: 0.2s; backdrop-filter: blur(2px); }
        .fav-btn.active { color: white; background: #ff4757; }

        .img-wrapper { width: 100%; height: 130px; background: #000; border-radius: 6px; overflow: hidden; margin-bottom: 10px; cursor: zoom-in; }
        .model-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .model-name { font-size: 14px; height: 36px; overflow: hidden; margin-bottom: 12px; color: #fff; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .btn-download { background: #28a745; color: white; text-decoration: none; padding: 10px; border-radius: 6px; font-size: 13px; font-weight: bold; margin-top: auto; }
        
        .modal { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; cursor: zoom-out; }
        .modal img { max-width: 95%; max-height: 95%; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="imageModal" class="modal" onclick="this.style.display='none'"><img id="modalImg" src=""></div>
    <input type="text" id="searchInput" placeholder="Пошук моделі...">
    
    <div id="mainMenu" class="menu-container">
        <button class="btn-cat active" onclick="resetAll(this)">Всі моделі</button>
        <button class="btn-cat btn-favorites" id="favCounterBtn" onclick="showFavorites(this)">❤️ ОБРАНЕ (0)</button>
        <button class="btn-cat" id="clearFavsBtn" onclick="clearAllFavorites()">🗑️ ОЧИСТИТИ</button>
    </div>

    <div id="midCategories" class="menu-container"></div>
    <div id="subCategories" class="menu-container"></div>
    <div id="modelsGrid" class="models-grid"></div>

    <script>
        const categoryData = {
    "#ARCHITECTURE_ELEMENTS_MENU": {

    },
    "#BATHROOM_MENU": {
        "#BATHROOM_FAUCETS_MENU": ["#BATHTUBE_FAUCETS", "#SHOWER_FAUCETS", "#HAND_WASHING_FAUCETS", "#HYGIENIC_SHOWERS"],
        "#BATHROOM_FURNITURE_MENU": ["#CLASSICAL_BATHROOM_FURNITURE", "#MODERN_BATHROOM_FURNITURE", "#WOODEN_BATHROOM_FURNITURE"],
        "#BATHTUBS_MENU": ["#FREESTANDING_BATHTUBS", "#BUILT_IN_BATHTUBS", "#JACUZZI", "#CORNER_BATHTUBS"],
        "#TOILETS_MENU": ["#HIDDEN_TOILETS", "#SMART_TOILETS", "#BIDETS", "#URINALS", "#TOILETS_SET"],
        "#WASH_BASINS_MENU": ["#OVERHEAD_WASH_BASINS", "#FREESTANDING_WASH_BASINS", "#CONSOLE_WASH_BASINS", "#DOUBLE_WASH_BASINS"],
        "#SHOWERS": ["#SHOWER_CABINS", "#SHOWER_DRAINS", "#SHOWER_TRAYS"]
    },
    "#FURNITURE_MENU": {
        "#SOFAS_MENU": ["#MODULAR_SOFAS", "#CORNER_SOFAS", "#THREE_PLACES_SOFAS", "#TWO_PLACES_SOFAS", "#LEATHER_SOFAS", "#RADIAL_SOFAS"],
        "#BEDS_MENU": ["#DOUBLE_BEDS", "#SINGLE_BEDS", "#CHILDRENS_BEDS", "#MATTRESSES", "#CIRCLE_BEDS"],
        "#CHAIRS_MENU": ["#BAR_CHAIRS", "#OFFICE_CHAIRS", "#CLASSICAL_CHAIRS", "#MODERN_CHAIRS", "#GAMING_CHAIRS"],
        "#TABLES_MENU": ["#DINING_TABLES", "#COFFEE_TABLES", "#WORKING_TABLES", "#DRESSING_TABLES"],
        "#CABINETS_MENU": ["#WARDROBE_CABINETS", "#CUPBOARDS", "#HOME_BARS", "#KITCHEN_CASES"],
        "#ARMCHAIRS_MENU": ["#CLASSICAL_ARMCHAIRS", "#MODERN_ARMCHAIRS", "#LEATHER_ARMCHAIRS", "#ROCKING_ARMCHAIRS", "#HANGING_ARMCHAIRS"],
        "#RACKS_MENU": ["#MODERN_RACKS", "#METALNESS_RACKS", "#WOODEN_RACKS", "#HANGING_RACKS"],
        "#OFFICE_FURNITURE_MENU": ["#RECEPTIONS", "#OFFICE_TABLES", "#OFFICE_CHAIRS", "#CONFERENCE_FURNITURE_SET"],
        "#CHEST_OF_DRAWERS_MENU": ["#CLASSICAL_CHEST_OF_DRAWERS", "#MODERN_CHEST_OF_DRAWERS", "#WOODEN_CHEST_OF_DRAWERS"],
        "#OUTDOOR_FURNITURE_MENU": ["#OUTDOOR_ARMCHAIRS", "#OUTDOOR_SOFAS", "#OUTDOOR_TABLES", "#OUTDOOR_SET"]
    },
    "#DECORATION_MENU": {
    "#WALL_DECORATION_MENU": [
        "#DECORATIVE_MASKS", 
        "#MACRAME", 
        "#SINGLE_WALL_DECORATION", 
        "#WALL_DECORATION_SET", 
        "#WALL_HEADS", 
        "#WALL_MAPS", 
        "#WOOD_DECORATION"
    ],
        "#CURTAINS_MENU": ["#ROMAN_BLINDS", "#ROLLER_BLINDS", "#CLASSICAL_CURTAINS", "#JALOUSIES", "#BLINDS"],
        "#CARPETS_MENU": ["#CLASSICAL_CARPETS", "#MODERN_CARPETS", "#SKIN_CARPETS", "#FLUFFY_CARPETS"],
        "#WALL_PANELS_MENU": ["#WOODEN_PANELS", "#GYPSUM_PANELS", "#SOFT_PANELS", "#STONE_PANELS"],
        "#CLOCKS_MENU": ["#WALLHANGING_CLOCKS", "#TABLESTANDING_CLOCKS", "#FLOORSTANDING_CLOCKS"],
        "#BAGS_MENU": ["#BACKPACKS", "#HANDBAGS", "#SUITCASES", "#SPORT_BAGS"],
        "#CLOTHES_MENU": ["#DRESSES", "#OUTERWEAR", "#SHIRTS", "#MANEKENS"],
        "#VASES_MENU": ["#CERAMIC_VASES", "#GLASS_VASES", "#DECORATIVE_VASES"]
    },
    "#KITCHEN_MENU": {
        "#KITCHEN_FURNITURE_SET_MENU": ["#MODERN_KITCHEN_FURNITURE", "#CLASSICAL_KITCHEN_FURNITURES", "#KITCHEN_ISLANDS"],
        "#KITCHEN_APPLIANCES_MENU": ["#REFRIGERATORS", "#KITCHEN_OVENS", "#KITCHEN_HOODS", "#DISHWASHERS", "#COFFEE_MACHINES"],
        "#KITCHEN_DECORATION_MENU": ["#TABLEWARES", "#DRINKS", "#FOOD", "#KITCHEN_HERBS"]
    },
    "#LIGHTING_MENU": {
        "#PENDANT_LAMPS_MENU": ["#CHANDLIERS", "#VINTAGE_CHANDLIERS", "#LARGE_PENDANT_SET"],
        "#SCONCES_MENU": ["#MODERN_SCONCES", "#CLASSICAL_SCONCES", "#DECORATIVE_SCONCES", "#READING_SCONCES"],
        "#SPOTLAMPS_MENU": ["#TRACK_LAMPS", "#BUILT_IN_SPOTLAMPS", "#OVEAHEAD_SPOTLAMPS"],
        "#OUTDOOR_LAMPS_MENU": ["#STREET_LAMPS", "#PAVEMENT_LAMPS", "#HANGING_OUTDOOR_LAMPS"],
        "#CEILING_LAMPS_MENU": ["#CLASSICAL_CEILING_LAMPS", "#MODERN_CEILING_LAMPS", "#FANS"]
    },
    "#NATURE_MENU": {
        "#PLANTS_MENU": ["#POTTED_INDOOR_PLANTS", "#DECORATIVE_PLANTS", "#HANGING_PLANTS", "#FLOWERS"],
        "#TREES": ["#CONIFEROUS_TREES", "#DECIDUOUS_TREES", "#TROPICAL_TREES", "#FRUIT_TREES"],
        "#BUSHES": ["#CONIFEROUS_BUSHES", "#FLOWERING_BUSHES"],
        "#BRANCHES_MENU": ["#BAMBOO_DECORATION", "#FIREWOODS", "#DECORATIVE_BRANCHES"]
    },
    "#TECHNOLOGIES_MENU": {
        "#ELECTRONICS_MENU": ["#PC_SET", "#LAPTOPS", "#TV_SET", "#SMARTPHONES", "#GAME_CONSOLES"],
        "#AUDIO_APPLIANCES_MENU": ["#AUDIO_SPEAKERS", "#AUDIO_SYSTEMS", "#HEADPHONES", "#VINYL_PLAYERS"],
        "#HOUSEHOLD_APPLIANCES_MENU": ["#AIR_CONDITIONING", "#VACUUM_CLEANER", "#WASHING_MACHINES"]
    },
    "#MATHERIALS_MENU": {
        "#STONES_MENU": ["#MARBLE", "#ONYX", "#TERAZZO", "#STONEWALL"],
        "#TILES_MENU": ["#BRICK_TILES", "#CONCRETE_TILES", "#MOSAIC", "#PATTERN_TILES"],
        "#WOOD_MENU": ["#FINE_WOOD", "#WOOD_FLOORING", "#WOOD_PANELS"]
    },
    "#OUTDOOR_ELEMENTS_MENU": {
        "#BUILDINGS_MENU": ["#APARTMENT_BUILDINGS", "#PERSONAL_BUILDINGS", "#SACRED_BUILDINGS"],
        "#HOME_ENVIROMENT_MENU": ["#SWIMMING_POOLS", "#BARBECUES", "#HOME_ARBORS"],
        "#URBAN_ENVIRONMENT_MENU": ["#STREET_BENCHES", "#PLAYGROUNDS", "#STREETS"]
    },
    "#VEHICLES_MENU": {
        "#LAND_VEHICLES_MENU": ["#CARS", "#BICYCLES", "#MOTORCICLES", "#TRUCKS"],
        "#AIR_VEHICLES": ["#AIRPLANES", "#HELICOPTERS"],
        "#WATER_VEHICLES": ["#SHIPS", "#YACHTS"]
    },
    "#FOR_CHILDRENS_MENU": {
        "#CHILDRENS_FURNITURE": ["#CHILDRENS_BEDS", "#CHILDRENS_CHAIRS", "#CHILDRENS_RACKS"],
        "#TOYS": ["#STUFFED_ANIMALS", "#FIGURINES_TOYS", "#TOYS_LEGO"]
    },
    "#OTHER_MENU": {
        "#SPORT_MENU": ["#GYM_EQUIPMENT", "#FITNESS_EQUIPMENT", "#BILLIARDS", "#TABLE_GAMES"],
        "#MUSICAL_INSTRUMENTS_MENU": ["#PIANOS", "#GUITARS", "#DRUMS"],
        "#MALL_PROPS_MENU": ["#ATMs", "#STORE_WINDOWS", "#CASINOS"]
    }
};

        let allModels = [];
        let favorites = JSON.parse(localStorage.getItem('my3dFavs')) || [];
        let curL1 = 'all', curL2 = 'all';

        const SHEET_ID = '1bcX0zQphJsAmFTySQ_iWYpNXgFnNZ5XGBHpGGvHI9K8';
        const JSON_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        async function loadModels() {
            try {
                const res = await fetch(JSON_URL);
                const text = await res.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                allModels = json.table.rows.map(row => {
                    let n = row.c[0] ? String(row.c[0].v).replace(/\[.*?\]/g, "").trim() : "Без назви";
                    let rawP = row.c[1] ? String(row.c[1].v) : "";
                    let fId = "";
                    if (rawP.includes('id=')) fId = rawP.split('id=')[1].split('&')[0];
                    else if (rawP.includes('/d/')) fId = rawP.split('/d/')[1].split('/')[0];
                    
                    return { 
                        id: fId || n, 
                        name: n, 
                        preview: fId ? `https://lh3.googleusercontent.com/d/${fId}` : rawP, 
                        archive: row.c[2] ? String(row.c[2].v) : "#", 
                        tags: row.c[3] ? String(row.c[3].v).toLowerCase() : "" 
                    };
                }).filter(m => m.name !== "Без назви");
                initMenu();
                renderModels(allModels);
                updateFavCounter();
            } catch (err) { console.error(err); }
        }

        // Чистка тексту від технічних символів
        function formatName(str) {
            return str.replace(/#/g, '').replace(/_MENU/g, '').replace(/_/g, ' ');
        }

        function initMenu() {
            const menu = document.getElementById('mainMenu');
            Object.keys(categoryData).forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'btn-cat';
                btn.innerText = formatName(cat);
                btn.onclick = () => selectLvl1(cat, btn);
                menu.appendChild(btn);
            });
        }

        function selectLvl1(cat, btn) {
            document.querySelectorAll('#mainMenu .btn-cat').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            // Чистимо тег для пошуку в базі (видаляємо # та _MENU)
            curL1 = cat.toLowerCase().replace('_menu', '').replace('#', '');
            curL2 = 'all';

            const midDiv = document.getElementById('midCategories');
            const subDiv = document.getElementById('subCategories');
            midDiv.innerHTML = '';
            midDiv.style.display = 'flex';
            subDiv.style.display = 'none';

            Object.keys(categoryData[cat]).forEach(mid => {
                const mBtn = document.createElement('button');
                mBtn.className = 'btn-cat';
                mBtn.innerText = formatName(mid);
                mBtn.onclick = () => selectLvl2(cat, mid, mBtn);
                midDiv.appendChild(mBtn);
            });
            filterModels();
        }

        function selectLvl2(lvl1, mid, btn) {
            document.querySelectorAll('#midCategories .btn-cat').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            curL2 = mid.toLowerCase().replace('_menu', '').replace('#', '');
            const subDiv = document.getElementById('subCategories');
            subDiv.innerHTML = '';
            subDiv.style.display = 'flex';

            categoryData[lvl1][mid].forEach(sub => {
                const sBtn = document.createElement('button');
                sBtn.className = 'btn-cat';
                sBtn.innerText = formatName(sub);
                sBtn.onclick = () => {
                    document.querySelectorAll('#subCategories .btn-cat').forEach(b => b.classList.remove('active'));
                    sBtn.classList.add('active');
                    filterModels(sub.toLowerCase().replace('#', ''));
                };
                subDiv.appendChild(sBtn);
            });
            filterModels();
        }

        function filterModels(subTag = 'all') {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allModels.filter(m => {
                const t = m.tags;
                const matchSearch = m.name.toLowerCase().includes(query) || t.includes(query);
                const matchL1 = curL1 === 'all' || t.includes(curL1);
                const matchL2 = curL2 === 'all' || t.includes(curL2);
                const matchL3 = subTag === 'all' || t.includes(subTag);
                return matchSearch && matchL1 && matchL2 && matchL3;
            });
            renderModels(filtered);
        }

        function resetAll(btn) {
            document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            curL1 = 'all'; curL2 = 'all';
            document.getElementById('midCategories').style.display = 'none';
            document.getElementById('subCategories').style.display = 'none';
            renderModels(allModels);
        }

        function renderModels(models) {
            const grid = document.getElementById('modelsGrid');
            grid.innerHTML = '';
            models.forEach(m => {
                const isFav = favorites.includes(m.id);
                const card = document.createElement('div');
                card.className = 'model-card';
                card.innerHTML = `
                    <button class="fav-btn ${isFav ? 'active' : ''}" onclick="event.stopPropagation(); toggleFavorite('${m.id}', this)">❤️</button>
                    <div class="img-wrapper" onclick="openModal('${m.preview}')"><img src="${m.preview}" loading="lazy"></div>
                    <div class="model-name">${m.name}</div>
                    <a href="${m.archive}" class="btn-download" target="_blank">Download</a>
                `;
                grid.appendChild(card);
            });
        }

        function toggleFavorite(id, btn) {
            const idx = favorites.indexOf(id);
            if (idx > -1) favorites.splice(idx, 1); else favorites.push(id);
            localStorage.setItem('my3dFavs', JSON.stringify(favorites));
            btn.classList.toggle('active');
            updateFavCounter();
        }

        function updateFavCounter() {
            document.getElementById('favCounterBtn').innerText = `❤️ ОБРАНЕ (${favorites.length})`;
            document.getElementById('clearFavsBtn').style.display = favorites.length > 0 ? 'inline-block' : 'none';
        }

        function showFavorites(btn) {
            document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('midCategories').style.display = 'none';
            document.getElementById('subCategories').style.display = 'none';
            renderModels(allModels.filter(m => favorites.includes(m.id)));
        }

        function clearAllFavorites() {
            if (confirm("Очистити обране?")) {
                favorites = []; localStorage.setItem('my3dFavs', JSON.stringify(favorites));
                updateFavCounter(); renderModels(allModels);
            }
        }

        function openModal(src) {
            document.getElementById('modalImg').src = src;
            document.getElementById('imageModal').style.display = 'flex';
        }

        document.getElementById('searchInput').oninput = () => filterModels();
        loadModels();
    </script>
</body>
</html>
