<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Base</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #1c1c1d; color: white; margin: 0; padding: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: #2c2c2e; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
        .card img { width: 100%; height: 120px; object-fit: cover; }
        .card-info { padding: 10px; }
        .card-title { font-size: 14px; font-weight: bold; margin-bottom: 8px; }
        .btn { 
            background: #007aff; color: white; border: none; padding: 8px; 
            border-radius: 6px; cursor: pointer; text-decoration: none; 
            text-align: center; font-size: 12px; display: block;
        }
        .search { width: 100%; padding: 10px; border-radius: 8px; border: none; margin-bottom: 20px; background: #2c2c2e; color: white; }
    </style>
</head>
<body>
    <input type="text" class="search" placeholder="Пошук моделей...">

    <div class="grid" id="catalog">
        </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Розгортає вікно на весь екран

        // Ваші 20 тестових моделей (приклад структури)
        const models = [
            {
                name: "Modern Sofa Velvet",
                preview: "https://via.placeholder.com/300x200", // Замініть на реальне фото
                link: "https://drive.google.com/uc?id=YOUR_FILE_ID_1&export=download"
            },
            {
                name: "Minimalist Lamp",
                preview: "https://via.placeholder.com/300x200",
                link: "https://drive.google.com/uc?id=YOUR_FILE_ID_2&export=download"
            }
        ];

        const container = document.getElementById('catalog');

        models.forEach(model => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${model.preview}" alt="${model.name}">
                <div class="card-info">
                    <div class="card-title">${model.name}</div>
                    <a href="${model.link}" class="btn" target="_blank">Завантажити (GDrive)</a>
                </div>
            `;
            container.appendChild(card);
        });
    </script>
</body>
</html>
