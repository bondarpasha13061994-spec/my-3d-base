<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Library</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; margin: 0; padding: 10px; }
        .menu-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .btn-cat { background: #333; color: white; border: 1px solid #444; padding: 8px 12px; border-radius: 5px; cursor: pointer; text-transform: capitalize; }
        .btn-cat.active { background: #007bff; border-color: #007bff; }
        .models-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .model-card { background: #2a2a2a; border-radius: 8px; overflow: hidden; padding: 10px; text-align: center; border: 1px solid #333; }
        .model-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 5px; background: #000; display: block; }
        .model-name { font-size: 14px; margin: 10px 0; height: 35px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .btn-download { display: block; background: #28a745; color: white; text-decoration: none; padding: 8px; border-radius: 5px; font-size: 13px; }
        #subCategories { margin-top: 10px; border-top: 1px solid #444; padding-top: 10px; display: none; }
        #searchInput { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 5px; border: none; background: #333; color: white; box-sizing: border-box; }
    </style>
</head>
<body>

    <input type="text" id="searchInput" placeholder="Пошук моделі за назвою або #тегом...">

    <div id="mainMenu" class="menu-container">
        <button class="btn-cat active" onclick="selectMain('all', this)">Всі моделі</button>
    </div>

    <div id="subCategories" class="menu-container"></div>

    <div id="modelsGrid" class="models-grid"></div>

    <script>
        // ПОВНИЙ СПИСОК ВАШИХ КАТЕГОРІЙ
        const categoryData = {
            "#architecture_elements": ["#ceiling", "#wall", "#floor", "#columns", "#stairs", "#windows", "#doors", "#moulding", "#beams"],
            "#furniture": ["#sofa", "#chair", "#armchair", "#bed", "#table", "#wardrobe", "#cabinet", "#pouf", "#tv_wall", "#shelving"],
            "#lighting": ["#pendant_lamp", "#chandelier", "#wall_lamp", "#floor_lamp", "#table_lamp", "#street_light", "#technical_light"],
            "#decor": ["#rugs", "#curtains", "#paintings", "#clocks", "#vases", "#mirrors", "#plants_indoor", "#books", "#candles", "#sculptures"],
            "#bathroom": ["#taps", "#bathtubs", "#ceramics", "#showers", "#toilets", "#sinks", "#bathroom_decor", "#towel_rails", "#bathroom_accessories"],
            "#kitchen": ["#kitchen_sets", "#appliances", "#sinks_kitchen", "#kitchen_islands", "#kitchen_decor", "#tableware", "#kitchen_tools"],
            "#nature": ["#trees", "#bushes", "#flowers", "#grass", "#rocks"],
            "#materials": ["#wood", "#stone", "#metal", "#fabric", "#glass", "#concrete", "#tiles", "#wallpaper"],
            "#outdoor": ["#garden_furniture", "#paving", "#fences", "#pools", "#pavilions"],
            "#technology": ["#tv", "#audio", "#computers", "#gadgets"]
        };

        let allModels = [];
        let currentMain = 'all';
        let currentSub = 'all';

        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/1bcX0zQphJsAmFTySQ_iWYpNXgFnNZ5XGBHpGGvHI9K8/export?format=csv';

        async function loadModels() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const data = await response.text();
                // Очищуємо від зайвих символів повернення каретки
                const rows = data.split(/\r?\n/).filter(row => row.trim() !== "").slice(1);

                allModels = rows.map(row => {
                    const columns = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    const clean = (val) => val ? val.replace(/^"|"$/g, '').trim() : "";
                    
                    return {
                        name: clean(columns[0]),
                        preview: clean(columns[1]),
                        archive: clean(columns[2]),
                        tags: clean(columns[3])
                    };
                }).filter(m => m.name);

                renderModels(allModels);
            } catch (e) {
                console.error("Помилка завантаження даних:", e);
            }
        }

        function renderModels(models) {
            const grid = document.getElementById('modelsGrid');
            grid.innerHTML = '';
            
            models.forEach(m => {
                const card = document.createElement('div');
                card.className = 'model-card';
                
                // Виправлена логіка: запобігаємо нескінченному морганню через onerror
                card.innerHTML = `
                    <img src="${m.preview}" 
                         alt="${m.name}" 
                         loading="lazy" 
                         onerror="this.onerror=null; this.src='https://via.placeholder.com/150?text=No+Preview';">
                    <div class="model-name">${m.name}</div>
                    <a href="${m.archive}" class="btn-download" target="_blank">Завантажити</a>
                `;
                grid.appendChild(card);
            });
        }

        function selectMain(cat, btn) {
            document.querySelectorAll('#mainMenu .btn-cat').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMain = cat;
            currentSub = 'all';
            
            const subDiv = document.getElementById('subCategories');
            subDiv.innerHTML = '';
            
            if (cat !== 'all' && categoryData[cat]) {
                subDiv.style.display = 'flex';
                categoryData[cat].forEach(sub => {
                    const sBtn = document.createElement('button');
                    sBtn.className = 'btn-cat';
                    sBtn.innerText = sub.replace('#', '').replace(/_/g, ' ');
                    sBtn.onclick = () => {
                        document.querySelectorAll('#subCategories .btn-cat').forEach(b => b.classList.remove('active'));
                        sBtn.classList.add('active');
                        currentSub = sub;
                        filterModels();
                    };
                    subDiv.appendChild(sBtn);
                });
            } else {
                subDiv.style.display = 'none';
            }
            filterModels();
        }

        function filterModels() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const filtered = allModels.filter(m => {
                const tags = (m.tags || "").toLowerCase();
                const name = (m.name || "").toLowerCase();
                
                const matchSearch = name.includes(query) || tags.includes(query);
                const matchMain = currentMain === 'all' || tags.includes(currentMain.toLowerCase());
                const matchSub = currentSub === 'all' || tags.includes(currentSub.toLowerCase());
                
                return matchSearch && matchMain && matchSub;
            });
            renderModels(filtered);
        }

        // Автоматичне створення кнопок головного меню
        const mainMenu = document.getElementById('mainMenu');
        Object.keys(categoryData).forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'btn-cat';
            btn.innerText = cat.replace('#', '').replace(/_/g, ' ');
            btn.onclick = () => selectMain(cat, btn);
            mainMenu.appendChild(btn);
        });

        document.getElementById('searchInput').oninput = filterModels;
        
        // Початкове завантаження
        loadModels();
    </script>
</body>
</html>
