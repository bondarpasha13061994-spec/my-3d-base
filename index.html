<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Library</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 15px; }
        #searchInput { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #333; background: #1e1e1e; color: white; font-size: 16px; box-sizing: border-box; outline: none; }
        .menu-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .btn-cat { background: #2c2c2c; color: #bbb; border: 1px solid #3d3d3d; padding: 10px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; text-transform: uppercase; transition: 0.2s; }
        .btn-cat.active { background: #007bff; color: white; border-color: #007bff; font-weight: bold; }
        .models-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
        .model-card { background: #1e1e1e; border-radius: 10px; overflow: hidden; padding: 12px; text-align: center; border: 1px solid #2c2c2c; display: flex; flex-direction: column; }
        .img-wrapper { width: 100%; height: 130px; background: #000; border-radius: 6px; overflow: hidden; margin-bottom: 10px; cursor: zoom-in; }
        .model-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .model-name { font-size: 14px; line-height: 1.3; height: 36px; overflow: hidden; margin-bottom: 12px; color: #fff; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .btn-download { background: #28a745; color: white; text-decoration: none; padding: 10px; border-radius: 6px; font-size: 13px; font-weight: bold; margin-top: auto; }
        #subCategories { padding-top: 15px; border-top: 1px solid #333; margin-top: 5px; display: none; }
        .modal { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; cursor: zoom-out; }
        .modal img { max-width: 95%; max-height: 95%; border-radius: 8px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="imageModal" class="modal" onclick="this.style.display='none'">
        <img id="modalImg" src="">
    </div>

    <input type="text" id="searchInput" placeholder="Пошук моделі за назвою або #тегом...">
    <div id="mainMenu" class="menu-container">
        <button class="btn-cat active" onclick="selectMain('all', this)">Всі моделі</button>
    </div>
    <div id="subCategories" class="menu-container"></div>
    <div id="modelsGrid" class="models-grid"></div>

    <script>
        const categoryData = {
            "#architecture_elements": ["#ceiling", "#wall", "#floor", "#columns", "#stairs", "#windows", "#doors", "#moulding", "#beams"],
            "#furniture": ["#sofa", "#chair", "#armchair", "#bed", "#table", "#wardrobe", "#cabinet", "#pouf", "#tv_wall", "#shelving", "#fireplace"],
            "#lighting": ["#pendant_lamp", "#chandelier", "#wall_lamp", "#floor_lamp", "#table_lamp", "#street_light", "#technical_light"],
            "#decor": ["#rugs", "#curtains", "#paintings", "#clocks", "#vases", "#mirrors", "#plants_indoor", "#books", "#candles", "#sculptures"],
            "#bathroom": ["#taps", "#bathtubs", "#ceramics", "#showers", "#toilets", "#sinks", "#bathroom_decor", "#towel_rails", "#bathroom_accessories"],
            "#kitchen": ["#kitchen_sets", "#appliances", "#sinks_kitchen", "#kitchen_islands", "#kitchen_decor", "#tableware", "#kitchen_tools"],
            "#nature": ["#trees", "#bushes", "#flowers", "#grass", "#rocks"],
            "#materials": ["#wood", "#stone", "#metal", "#fabric", "#glass", "#concrete", "#tiles", "#wallpaper"],
            "#outdoor": ["#garden_furniture", "#paving", "#fences", "#pools", "#pavilions"],
            "#technology": ["#tv", "#audio", "#computers", "#gadgets"]
        };

        let allModels = [];
        let currentMain = 'all';
        let currentSub = 'all';

        const SHEET_ID = '1bcX0zQphJsAmFTySQ_iWYpNXgFnNZ5XGBHpGGvHI9K8';
        const JSON_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        async function loadModels() {
            try {
                const res = await fetch(JSON_URL);
                const text = await res.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                
                allModels = json.table.rows.map(row => {
                    let name = row.c[0] ? String(row.c[0].v) : "Без назви";
                    // Очищення назви прямо в браузері про всяк випадок
                    name = name.replace(/\[3DmooD 🇺🇦 UKRAINE\]/g, "").replace(/3DmooD/g, "").trim();

                    let rawPreview = row.c[1] ? String(row.c[1].v) : "";
                    let fileId = "";

                    if (rawPreview.includes('id=')) {
                        fileId = rawPreview.split('id=')[1].split('&')[0];
                    } else if (rawPreview.includes('/d/')) {
                        fileId = rawPreview.split('/d/')[1].split('/')[0];
                    }

                    // ВИПРАВЛЕНО: використання зворотних лапок та ${}
                    let finalPreview = fileId ? `https://lh3.googleusercontent.com/d/${fileId}` : rawPreview;

                    return {
                        name: name,
                        preview: finalPreview,
                        archive: row.c[2] ? String(row.c[2].v) : "#",
                        tags: row.c[3] ? String(row.c[3].v) : ""
                    };
                }).filter(m => m.name !== "Без назви");

                renderModels(allModels);
            } catch (err) { console.error("Помилка:", err); }
        }

        function renderModels(models) {
            const grid = document.getElementById('modelsGrid');
            grid.innerHTML = '';
            models.forEach(m => {
                const card = document.createElement('div');
                card.className = 'model-card';
                card.innerHTML = `
                    <div class="img-wrapper" onclick="openModal('${m.preview}')">
                        <img src="${m.preview}" loading="lazy" onerror="this.src='https://via.placeholder.com/160x130/2c2c2c/888888?text=No+Preview'">
                    </div>
                    <div class="model-name">${m.name}</div>
                    <a href="${m.archive}" class="btn-download" target="_blank">Download</a>
                `;
                grid.appendChild(card);
            });
        }

        function openModal(src) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImg');
            modal.style.display = 'flex';
            modalImg.src = src;
        }

        function selectMain(cat, btn) {
            document.querySelectorAll('#mainMenu .btn-cat').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMain = cat;
            currentSub = 'all';
            const subDiv = document.getElementById('subCategories');
            subDiv.innerHTML = '';
            
            if (cat !== 'all' && categoryData[cat]) {
                subDiv.style.display = 'flex';
                categoryData[cat].forEach(sub => {
                    const sBtn = document.createElement('button');
                    sBtn.className = 'btn-cat';
                    sBtn.innerText = sub.replace('#', '').replace(/_/g, ' ');
                    sBtn.onclick = () => {
                        document.querySelectorAll('#subCategories .btn-cat').forEach(b => b.classList.remove('active'));
                        sBtn.classList.add('active');
                        currentSub = sub;
                        filterModels();
                    };
                    subDiv.appendChild(sBtn);
                });
            } else { subDiv.style.display = 'none'; }
            filterModels();
        }

        function filterModels() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allModels.filter(m => {
                const t = m.tags.toLowerCase();
                const n = m.name.toLowerCase();
                return (n.includes(query) || t.includes(query)) &&
                       (currentMain === 'all' || t.includes(currentMain.toLowerCase())) &&
                       (currentSub === 'all' || t.includes(currentSub.toLowerCase()));
            });
            renderModels(filtered);
        }

        const menu = document.getElementById('mainMenu');
        Object.keys(categoryData).forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'btn-cat';
            btn.innerText = cat.replace('#', '').replace(/_/g, ' ');
            btn.onclick = () => selectMain(cat, btn);
            menu.appendChild(btn);
        });

        document.getElementById('searchInput').oninput = filterModels;
        loadModels();
    </script>
</body>
</html>
