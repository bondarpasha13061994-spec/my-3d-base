<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Library</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; padding: 15px; }
        #searchInput { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: none; background: #222; color: white; }
        .menu-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .btn-cat { background: #333; color: #ccc; border: 1px solid #444; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 12px; text-transform: uppercase; }
        .btn-cat.active { background: #007bff; color: white; border-color: #007bff; }
        .models-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .model-card { background: #1e1e1e; border-radius: 10px; padding: 10px; text-align: center; border: 1px solid #222; }
        .img-container { width: 100%; height: 120px; background: #000; border-radius: 6px; overflow: hidden; margin-bottom: 8px; }
        .model-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .model-name { font-size: 13px; height: 34px; overflow: hidden; margin-bottom: 10px; line-height: 1.2; }
        .btn-download { display: block; background: #28a745; color: white; text-decoration: none; padding: 8px; border-radius: 5px; font-size: 12px; font-weight: bold; }
        #subCategories { padding-top: 10px; border-top: 1px solid #333; display: none; }
    </style>
</head>
<body>

    <input type="text" id="searchInput" placeholder="Пошук моделей...">
    <div id="mainMenu" class="menu-container">
        <button class="btn-cat active" onclick="selectMain('all', this)">Всі моделі</button>
    </div>
    <div id="subCategories" class="menu-container"></div>
    <div id="modelsGrid" class="models-grid"></div>

    <script>
        const categoryData = {
            "#architecture_elements": ["#ceiling", "#wall", "#floor", "#columns", "#stairs", "#windows", "#doors", "#moulding", "#beams"],
            "#furniture": ["#sofa", "#chair", "#armchair", "#bed", "#table", "#wardrobe", "#cabinet", "#pouf", "#tv_wall", "#shelving"],
            "#lighting": ["#pendant_lamp", "#chandelier", "#wall_lamp", "#floor_lamp", "#table_lamp", "#street_light", "#technical_light"],
            "#decor": ["#rugs", "#curtains", "#paintings", "#clocks", "#vases", "#mirrors", "#plants_indoor", "#books", "#candles", "#sculptures"],
            "#bathroom": ["#taps", "#bathtubs", "#ceramics", "#showers", "#toilets", "#sinks", "#bathroom_decor", "#towel_rails", "#bathroom_accessories"],
            "#kitchen": ["#kitchen_sets", "#appliances", "#sinks_kitchen", "#kitchen_islands", "#kitchen_decor", "#tableware", "#kitchen_tools"],
            "#nature": ["#trees", "#bushes", "#flowers", "#grass", "#rocks"],
            "#materials": ["#wood", "#stone", "#metal", "#fabric", "#glass", "#concrete", "#tiles", "#wallpaper"],
            "#outdoor": ["#garden_furniture", "#paving", "#fences", "#pools", "#pavilions"],
            "#technology": ["#tv", "#audio", "#computers", "#gadgets"]
        };

        let allModels = [];
        let currentMain = 'all';
        let currentSub = 'all';

        const SHEET_ID = '1bcX0zQphJsAmFTySQ_iWYpNXgFnNZ5XGBHpGGvHI9K8';
        // Використовуємо формат tq? - він набагато стабільніший за CSV
        const JSON_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        async function loadModels() {
            try {
                const res = await fetch(JSON_URL);
                const text = await res.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                
                allModels = json.table.rows.map(row => ({
                    name: row.c[0] ? String(row.c[0].v) : "",
                    preview: row.c[1] ? String(row.c[1].v) : "",
                    archive: row.c[2] ? String(row.c[2].v) : "",
                    tags: row.c[3] ? String(row.c[3].v) : ""
                })).filter(m => m.name && m.preview.includes('http'));

                renderModels(allModels);
            } catch (err) { console.error("Помилка:", err); }
        }

        function renderModels(models) {
            const grid = document.getElementById('modelsGrid');
            grid.innerHTML = '';
            models.forEach(m => {
                const card = document.createElement('div');
                card.className = 'model-card';
                card.innerHTML = `
                    <div class="img-container">
                        <img src="${m.preview}" loading="lazy" onerror="this.src='https://via.placeholder.com/150?text=Error'">
                    </div>
                    <div class="model-name">${m.name}</div>
                    <a href="${m.archive}" class="btn-download" target="_blank">Download</a>
                `;
                grid.appendChild(card);
            });
        }

        function selectMain(cat, btn) {
            document.querySelectorAll('#mainMenu .btn-cat').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMain = cat;
            currentSub = 'all';
            const subDiv = document.getElementById('subCategories');
            subDiv.innerHTML = '';
            if (cat !== 'all' && categoryData[cat]) {
                subDiv.style.display = 'flex';
                categoryData[cat].forEach(sub => {
                    const sBtn = document.createElement('button');
                    sBtn.className = 'btn-cat';
                    sBtn.innerText = sub.replace('#', '').replace(/_/g, ' ');
                    sBtn.onclick = () => {
                        document.querySelectorAll('#subCategories .btn-cat').forEach(b => b.classList.remove('active'));
                        sBtn.classList.add('active');
                        currentSub = sub;
                        filterModels();
                    };
                    subDiv.appendChild(sBtn);
                });
            } else { subDiv.style.display = 'none'; }
            filterModels();
        }

        function filterModels() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allModels.filter(m => {
                const t = m.tags.toLowerCase();
                const n = m.name.toLowerCase();
                return (n.includes(query) || t.includes(query)) &&
                       (currentMain === 'all' || t.includes(currentMain.toLowerCase())) &&
                       (currentSub === 'all' || t.includes(currentSub.toLowerCase()));
            });
            renderModels(filtered);
        }

        const menu = document.getElementById('mainMenu');
        Object.keys(categoryData).forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'btn-cat';
            btn.innerText = cat.replace('#', '').replace(/_/g, ' ');
            btn.onclick = () => selectMain(cat, btn);
            menu.appendChild(btn);
        });

        document.getElementById('searchInput').oninput = filterModels;
        loadModels();
    </script>
</body>
</html>
