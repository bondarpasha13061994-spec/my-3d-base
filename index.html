        window.authHandler = function(data) {
            console.log("Відповідь авторизації:", data);
            if (data && data.access) {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                loadModels();
            } else {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('paywall').style.display = 'flex';
            }
        };

        function startAuth() {
            const user = tg.initDataUnsafe?.user;
            if (!user) {
                // Якщо зайти не з Телеграм - показуємо замок
                document.getElementById('paywall').style.display = 'flex';
                document.getElementById('loader').style.display = 'none';
                return;
            }

            const userId = String(user.id);
            const userName = encodeURIComponent(user.username || (user.first_name + " " + (user.last_name || "")));

            // Створюємо скрипт-тег для JSONP запиту
            const script = document.createElement('script');
            script.src = `${AUTH_SCRIPT_URL}?userId=${userId}&userName=${userName}&callback=authHandler&t=${Date.now()}`;
            document.body.appendChild(script);

            // Тайм-аут на випадок збою мережі
            setTimeout(() => {
                if (document.getElementById('loader').style.display !== 'none') {
                    document.getElementById('loader').innerHTML = '<div style="color:#ff4757;">Помилка мережі. Оновіть сторінку (Reload).</div>';
                }
            }, 8000);
        }

        // --- 2. РОБОТА З МОДЕЛЯМИ ---

        async function loadModels() {
            try {
                const res = await fetch(JSON_URL);
                const text = await res.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                
                allModels = json.table.rows
                    .filter(row => row.c && row.c[0] && row.c[0].v)
                    .map(row => {
                        let n = String(row.c[0].v).replace(/\[.*?\]/g, "").trim();
                        let rawP = row.c[1] ? String(row.c[1].v) : "";
                        let fId = "";
                        if (rawP.includes('id=')) fId = rawP.split('id=')[1].split('&')[0];
                        else if (rawP.includes('/d/')) fId = rawP.split('/d/')[1].split('/')[0];
                        
                        return { 
                            id: fId || n, 
                            name: n, 
                            preview: fId ? `https://googleusercontent.com/profile/picture/0{fId}` : rawP, // Твоє оригінальне превью
                            archive: row.c[2] ? String(row.c[2].v) : "#", 
                            tags: row.c[3] ? String(row.c[3].v).toLowerCase() : "" 
                        };
                    });

                initMenu();
                renderModels(allModels);
                updateFavCounter();
            } catch (err) { console.error("Error loading models:", err); }
        }

        function formatName(str) {
            return str.replace(/#/g, '').replace(/_MENU/g, '').replace(/_/g, ' ');
        }

        function initMenu() {
            const menu = document.getElementById('mainMenu');
            const existingBtns = menu.querySelectorAll('.btn-cat');
            existingBtns.forEach(btn => {
                if (btn.innerText !== "Всі моделі" && !btn.id.includes('fav')) btn.remove();
            });

            Object.keys(categoryData).forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'btn-cat';
                btn.innerText = formatName(cat);
                btn.onclick = () => selectLvl1(cat, btn);
                menu.appendChild(btn);
            });
        }

        function selectLvl1(cat, btn) {
            document.querySelectorAll('#mainMenu .btn-cat').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            curL1 = cat.toLowerCase().replace('_menu', '').replace('#', '');
            curL2 = 'all';
            document.getElementById('midCategories').innerHTML = '';
            document.getElementById('midCategories').style.display = 'flex';
            document.getElementById('subCategories').style.display = 'none';
            Object.keys(categoryData[cat]).forEach(mid => {
                const mBtn = document.createElement('button');
                mBtn.className = 'btn-cat';
                mBtn.innerText = formatName(mid);
                mBtn.onclick = () => selectLvl2(cat, mid, mBtn);
                document.getElementById('midCategories').appendChild(mBtn);
            });
            filterModels();
        }

        function selectLvl2(lvl1, mid, btn) {
            document.querySelectorAll('#midCategories .btn-cat').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            curL2 = mid.toLowerCase().replace('_menu', '').replace('#', '');
            document.getElementById('subCategories').innerHTML = '';
            document.getElementById('subCategories').style.display = 'flex';
            categoryData[lvl1][mid].forEach(sub => {
                const sBtn = document.createElement('button');
                sBtn.className = 'btn-cat';
                sBtn.innerText = formatName(sub);
                sBtn.onclick = () => {
                    document.querySelectorAll('#subCategories .btn-cat').forEach(b => b.classList.remove('active'));
                    sBtn.classList.add('active');
                    filterModels(sub.toLowerCase().replace('#', ''));
                };
                document.getElementById('subCategories').appendChild(sBtn);
            });
            filterModels();
        }

        function filterModels(subTag = 'all') {
            displayLimit = 60;
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allModels.filter(m => {
                const t = m.tags;
                const matchSearch = m.name.toLowerCase().includes(query) || t.includes(query);
                if (curL1 === 'all' && query === '') return true;
                const matchL1 = curL1 === 'all' || t.includes(curL1);
                const matchL2 = curL2 === 'all' || t.includes(curL2);
                const matchL3 = subTag === 'all' || t.includes(subTag);
                return matchSearch && matchL1 && matchL2 && matchL3;
            });
            renderModels(filtered);
        }

        function renderModels(models) {
            const grid = document.getElementById('modelsGrid');
            grid.innerHTML = '';
            const visibleModels = models.slice(0, displayLimit);
            
            visibleModels.forEach(m => {
                const isFav = favorites.includes(m.id);
                const card = document.createElement('div');
                card.className = 'model-card';
                card.innerHTML = `
                    <button class="fav-btn ${isFav ? 'active' : ''}" onclick="event.stopPropagation(); toggleFavorite('${m.id}', this)">❤️</button>
                    <div class="img-wrapper" onclick="openModal('${m.preview}')">
                        <img src="${m.preview}" loading="lazy" onerror="this.src='https://via.placeholder.com/160x130/2c2c2c/888888?text=Error'">
                    </div>
                    <div class="model-name">${m.name}</div>
                    <a href="${m.archive}" class="btn-download" target="_blank">Download</a>
                `;
                grid.appendChild(card);
            });

            if (models.length > displayLimit) {
                const moreBtn = document.createElement('button');
                moreBtn.className = 'btn-cat';
                moreBtn.style.cssText = "width: 100%; margin: 20px 0; padding: 15px; background: #333; color: #fff; border: 1px solid #444; cursor: pointer; font-weight: bold; border-radius: 8px;";
                moreBtn.innerText = `ПОКАЗАТИ ЩЕ (Залишилось ${models.length - displayLimit})`;
                moreBtn.onclick = () => {
                    displayLimit += 100;
                    renderModels(models);
                };
                grid.appendChild(moreBtn);
            }
        }

        function resetAll(btn) {
            document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            curL1 = 'all'; curL2 = 'all';
            displayLimit = 60;
            document.getElementById('midCategories').style.display = 'none';
            document.getElementById('subCategories').style.display = 'none';
            renderModels(allModels);
        }

        function toggleFavorite(id, btn) {
            const idx = favorites.indexOf(id);
            if (idx > -1) favorites.splice(idx, 1); else favorites.push(id);
            localStorage.setItem('my3dFavs', JSON.stringify(favorites));
            btn.classList.toggle('active');
            updateFavCounter();
        }

        function updateFavCounter() {
            document.getElementById('favCounterBtn').innerText = `❤️ ОБРАНЕ (${favorites.length})`;
            document.getElementById('clearFavsBtn').style.display = favorites.length > 0 ? 'inline-block' : 'none';
        }

        function showFavorites(btn) {
            document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('midCategories').style.display = 'none';
            document.getElementById('subCategories').style.display = 'none';
            renderModels(allModels.filter(m => favorites.includes(m.id)));
        }

        function clearAllFavorites() {
            if (confirm("Очистити обране?")) {
                favorites = []; localStorage.setItem('my3dFavs', JSON.stringify(favorites));
                updateFavCounter(); renderModels(allModels);
            }
        }

        function openModal(src) {
            document.getElementById('modalImg').src = src;
            document.getElementById('imageModal').style.display = 'flex';
        }

        document.getElementById('searchInput').oninput = () => filterModels();

        // ЗАПУСК
        startAuth();

    </script>
</body>
</html>
